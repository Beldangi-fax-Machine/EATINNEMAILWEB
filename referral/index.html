<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Eat-Inn with Referral Code</title>

    <link rel="apple-touch-icon" sizes="180x180" href="/icons/blackfavicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/blackfavicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/blackfavicon/favicon-16x16.png">
    <link rel="icon" type="image/x-icon" href="/icons/blackfavicon/favicon.ico">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #000;
            --bg-elevated: #111;
            --text: #fff;
            --text-secondary: #888;
            --border: #222;
            --primary: #FF6B35;
            --primary-dark: #E85A2A;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #000 0%, #1a0a0a 100%);
            color: var(--text);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 480px;
            width: 100%;
        }

        .card {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px 32px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 800;
            color: white;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        .code-display {
            background: rgba(255, 107, 53, 0.1);
            border: 2px solid var(--primary);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 32px;
        }

        .code-label {
            font-size: 13px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .code-value {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 4px;
            color: var(--primary);
            font-family: 'Courier New', monospace;
        }

        .benefits {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 32px;
            text-align: left;
        }

        .benefit {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            font-size: 15px;
        }

        .benefit:last-child {
            margin-bottom: 0;
        }

        .benefit-icon {
            width: 24px;
            height: 24px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            flex-shrink: 0;
            font-size: 14px;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 16px 32px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(255, 107, 53, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(255, 107, 53, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .expiry-note {
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .expiry-time {
            color: var(--primary);
            font-weight: 600;
        }

        .error-message {
            background: rgba(220, 38, 38, 0.1);
            border: 2px solid #DC2626;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            color: #FCA5A5;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .card {
                padding: 40px 24px;
            }

            h1 {
                font-size: 24px;
            }

            .code-value {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">🍽️</div>

            <div id="content">
                <!-- Content injected by JavaScript -->
            </div>
        </div>
    </div>

    <script>
        // Extract referral code from URL
        const urlParams = new URLSearchParams(window.location.search);
        const referralCode = urlParams.get('code');

        const contentDiv = document.getElementById('content');

        if (!referralCode) {
            // No code provided
            contentDiv.innerHTML = `
                <div class="error-message">
                    <strong>⚠️ Missing Referral Code</strong><br>
                    This link is missing a referral code.
                </div>
                <h1>Download Eat-Inn</h1>
                <p class="subtitle">Transform your ingredients into delicious recipes</p>
                <a href="https://apps.apple.com/app/eat-inn/id6739009346" class="btn">
                    Download on App Store
                </a>
            `;
        } else {
            // Valid code - show referral info
            contentDiv.innerHTML = `
                <h1>You've Been Invited!</h1>
                <p class="subtitle">Join Eat-Inn and get bonus tokens</p>

                <div class="code-display">
                    <div class="code-label">Referral Code</div>
                    <div class="code-value">${referralCode}</div>
                </div>

                <div class="benefits">
                    <div class="benefit">
                        <div class="benefit-icon">🎁</div>
                        <div>Get <strong>10 bonus tokens</strong> when you sign up</div>
                    </div>
                    <div class="benefit">
                        <div class="benefit-icon">🍳</div>
                        <div>Generate AI recipes from your ingredients</div>
                    </div>
                    <div class="benefit">
                        <div class="benefit-icon">📊</div>
                        <div>Track nutrition and plan meals</div>
                    </div>
                </div>

                <button id="openAppBtn" class="btn">
                    <span id="btnText">Open Eat-Inn</span>
                    <span id="btnLoading" style="display: none;"><span class="loading"></span></span>
                </button>

                <p class="expiry-note">
                    ⏱️ This code expires in <span class="expiry-time">20 minutes</span>
                </p>
            `;

            // Handle deep link
            const openAppBtn = document.getElementById('openAppBtn');
            const btnText = document.getElementById('btnText');
            const btnLoading = document.getElementById('btnLoading');

            openAppBtn.addEventListener('click', () => {
                // Show loading
                btnText.style.display = 'none';
                btnLoading.style.display = 'inline-block';

                // Try to open app with deep link
                const deepLink = `eatinn://referral?code=${referralCode}`;
                const appStoreLink = 'https://apps.apple.com/app/eat-inn/id6739009346';

                // Attempt to open app
                window.location.href = deepLink;

                // Fallback to App Store after 2 seconds if app doesn't open
                setTimeout(() => {
                    // Check if user is still on page (app didn't open)
                    if (document.hasFocus()) {
                        window.location.href = appStoreLink;
                    }
                }, 2000);
            });

            // Auto-redirect after 3 seconds
            setTimeout(() => {
                openAppBtn.click();
            }, 3000);
        }
    </script>
</body>
</html>
